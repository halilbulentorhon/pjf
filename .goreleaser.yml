version: 2

project_name: pjf

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - main: .
    binary: pjf
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^test:"

brews:
  - repository:
      owner: halilbulentorhon
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: https://github.com/halilbulentorhon/pjf
    description: Fast terminal UI for discovering and managing local dev projects
    license: MIT
    install: |
      bin.install "pjf"
    test: |
      system "#{bin}/pjf", "--help"
